---
mprlab_resources:
  schema_version: 1
  repo:
    id: llm-proxy
    directory: llm-proxy
    dispatch_target: llm-proxy
  resources:
    - type: make_workflow
      name: llm-proxy
      targets:
        release: release
        publish: publish
        deploy: deploy
    - type: container_service
      name: llm-proxy
      host_group: gateway
      image: ghcr.io/tyemirov/llm-proxy:latest
      container_port: 8080
      compose_project: mprlab-gateway
    - type: caddy_route
      name: llm-proxy
      host: llm-proxy.mprlab.com
      upstream: llm-proxy:8080
      snippet: llm-proxy.caddy
    - type: health_check
      name: llm-proxy
      path: /
      url: https://llm-proxy.mprlab.com/
      status_codes:
        - 403
