<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Proxy</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@v3.9.0/mpr-ui.css">
    <link rel="stylesheet" href="/assets/llm-proxy/styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@v3.9.0/mpr-ui-config.js"></script>
    <script type="module" src="/assets/llm-proxy/js/app.js"></script>
  </head>
  <body>
    <mpr-header
      id="llm-proxy-header"
      data-config-url="__LLM_PROXY_CONFIG_URL__"
      brand-label="LLM Proxy"
      brand-href="/"
      auth-transition='{"title":"Opening LLM Proxy","message":"Loading your key workspace.","completionEvent":"llm-proxy:management-ready"}'
    >
      <mpr-user slot="aux" display-mode="avatar" logout-url="/" logout-label="Sign out"></mpr-user>
    </mpr-header>

    <main class="llm-proxy-main">
      <llm-proxy-key-management x-data="llmProxyKeyManagement" x-init="init()" x-bind:data-auth-state="authState">
        <section class="llm-panel" x-cloak x-show="authState === states.loading">
          <p class="eyebrow" x-text="copy.loadingEyebrow"></p>
          <h1 x-text="copy.loadingTitle"></h1>
        </section>

        <section class="llm-panel" x-cloak x-show="authState === states.unauthenticated">
          <p class="eyebrow" x-text="copy.signedOutEyebrow"></p>
          <h1 x-text="copy.signedOutTitle"></h1>
        </section>

        <template x-if="authState === states.authenticated">
          <workspace-surface>
            <section class="llm-panel llm-panel-primary">
              <header class="section-header">
                <div>
                  <p class="eyebrow" x-text="copy.tenantEyebrow"></p>
                  <h1 x-text="copy.tenantTitle"></h1>
                </div>
                <tenant-actions>
                  <button type="button" class="icon-button" x-on:click="generateSecret()" x-bind:disabled="busy" x-bind:title="copy.generateSecret">
                    <span aria-hidden="true">+</span>
                    <span x-text="copy.generateSecret"></span>
                  </button>
                  <button type="button" class="icon-button danger" x-on:click="revokeSecret()" x-bind:disabled="busy || !hasSecret" x-bind:title="copy.revokeSecret">
                    <span aria-hidden="true">x</span>
                    <span x-text="copy.revokeSecret"></span>
                  </button>
                </tenant-actions>
              </header>

              <dl class="tenant-facts">
                <div>
                  <dt x-text="copy.tenantId"></dt>
                  <dd x-text="tenantId"></dd>
                </div>
                <div>
                  <dt x-text="copy.secretStatus"></dt>
                  <dd x-text="hasSecret ? copy.secretReady : copy.secretMissing"></dd>
                </div>
              </dl>

              <secret-output x-show="generatedSecret" x-cloak>
                <label for="generated-secret" x-text="copy.generatedSecret"></label>
                <div class="secret-row">
                  <input id="generated-secret" type="text" readonly x-bind:value="generatedSecret">
                  <button type="button" class="icon-only" x-on:click="copyGeneratedSecret()" x-bind:title="copy.copySecret" x-bind:aria-label="copy.copySecret">[]</button>
                </div>
              </secret-output>
            </section>

            <section class="llm-grid">
              <defaults-editor class="llm-panel">
                <header class="section-header compact">
                  <div>
                    <p class="eyebrow" x-text="copy.defaultsEyebrow"></p>
                    <h2 x-text="copy.defaultsTitle"></h2>
                  </div>
                </header>
                <form class="stack" x-on:submit.prevent="saveDefaults()">
                  <label>
                    <span x-text="copy.textProvider"></span>
                    <select x-model="defaults.provider" x-on:change="selectTextProviderDefaultModel()">
                      <template x-for="provider in providers" x-bind:key="provider.id">
                        <option x-bind:value="provider.id" x-text="provider.label"></option>
                      </template>
                    </select>
                  </label>
                  <label>
                    <span x-text="copy.textModel"></span>
                    <select x-model="defaults.model">
                      <template x-for="model in selectedTextModels" x-bind:key="model">
                        <option x-bind:value="model" x-text="model"></option>
                      </template>
                    </select>
                  </label>
                  <label>
                    <span x-text="copy.dictationProvider"></span>
                    <select x-model="defaults.dictation_provider" x-on:change="selectDictationProviderDefaultModel()">
                      <option value="" x-text="copy.noDictationDefault"></option>
                      <template x-for="provider in dictationProviders" x-bind:key="provider.id">
                        <option x-bind:value="provider.id" x-text="provider.label"></option>
                      </template>
                    </select>
                  </label>
                  <label>
                    <span x-text="copy.dictationModel"></span>
                    <select x-model="defaults.dictation_model" x-bind:disabled="!defaults.dictation_provider">
                      <option value="" x-text="copy.noDictationModel"></option>
                      <template x-for="model in selectedDictationModels" x-bind:key="model">
                        <option x-bind:value="model" x-text="model"></option>
                      </template>
                    </select>
                  </label>
                  <label>
                    <span x-text="copy.systemPrompt"></span>
                    <textarea rows="4" x-model="defaults.system_prompt"></textarea>
                  </label>
                  <button type="submit" x-bind:disabled="busy" x-text="copy.saveDefaults"></button>
                </form>
              </defaults-editor>

              <usage-panel class="llm-panel">
                <header class="section-header compact">
                  <div>
                    <p class="eyebrow" x-text="copy.usageEyebrow"></p>
                    <h2 x-text="copy.usageTitle"></h2>
                  </div>
                </header>
                <pre class="usage-snippet" x-text="usageCurl"></pre>
              </usage-panel>
            </section>

            <section class="llm-panel">
              <header class="section-header compact">
                <div>
                  <p class="eyebrow" x-text="copy.providersEyebrow"></p>
                  <h2 x-text="copy.providersTitle"></h2>
                </div>
              </header>
              <provider-list>
                <template x-for="provider in providers" x-bind:key="provider.id">
                  <provider-key-card>
                    <header>
                      <div>
                        <h3 x-text="provider.label"></h3>
                        <p x-text="provider.has_key ? provider.masked_key : copy.providerMissing"></p>
                      </div>
                      <button type="button" class="icon-only danger" x-on:click="removeProviderKey(provider)" x-bind:disabled="busy || !provider.has_key" x-bind:title="copy.removeProviderKey" x-bind:aria-label="copy.removeProviderKey">x</button>
                    </header>
                    <form class="provider-key-form" x-on:submit.prevent="saveProviderKey(provider)">
                      <label>
                        <span x-text="provider.label + copy.providerKeySuffix"></span>
                        <input type="password" autocomplete="off" x-model="providerInputs[provider.id]">
                      </label>
                      <button type="submit" x-bind:disabled="busy" x-text="provider.has_key ? copy.updateProviderKey : copy.saveProviderKey"></button>
                    </form>
                  </provider-key-card>
                </template>
              </provider-list>
            </section>

            <output class="notice" x-cloak x-show="notice.message" x-bind:data-kind="notice.kind" x-text="notice.message"></output>
          </workspace-surface>
        </template>
      </llm-proxy-key-management>
    </main>

    <mpr-footer theme-switcher="square"></mpr-footer>
  </body>
</html>
