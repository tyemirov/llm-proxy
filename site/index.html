<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Proxy</title>
    <meta name="description" content="LLM Proxy routes authenticated text and dictation requests to configured LLM providers while keeping provider credentials server-side.">
    <link rel="canonical" href="https://llm-proxy.mprlab.com/">
    <meta property="og:title" content="LLM Proxy">
    <meta property="og:description" content="Route text, dictation, provider credentials, and usage workflows through one tenant-secret LLM proxy.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://llm-proxy.mprlab.com/">
    <meta name="twitter:card" content="summary">
    <meta name="theme-color" content="#0076c3">
    <link rel="icon" type="image/svg+xml" href="/assets/llm-proxy/img/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/llm-proxy/img/llm-proxy-icon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&amp;icon_names=delete,key,visibility,visibility_off&amp;display=block">
    <link rel="stylesheet" href="/assets/llm-proxy/styles.css">
    <script defer src="/assets/llm-proxy/js/googleAnalytics.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.3.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui-config.js"></script>
    <script
      id="mpr-ui-bundle"
      type="application/json"
      data-mpr-ui-bundle-src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.js"
    ></script>
    <script type="module" src="/assets/llm-proxy/js/app.js"></script>
    <script defer src="https://loopaware.mprlab.com/pixel.js?site_id=839f018b-97a9-4955-a489-4ad5cb626f4f"></script>
  </head>
  <body x-data="llmProxyKeyManagement" x-init="init()">
    <mpr-header
      id="llm-proxy-header"
      data-config-url="/config-ui.yaml"
      auth-transition='{"title":"Opening LLM Proxy","message":"Loading your key workspace.","completionEvent":"llm-proxy:management-ready"}'
    >
      <a slot="brand" class="llm-proxy-header-brand" href="/" aria-label="LLM Proxy home">
        <img class="llm-proxy-header-brand__logo" src="/assets/llm-proxy/img/llm-proxy-icon.svg" alt="" aria-hidden="true">
        <span class="llm-proxy-header-brand__title">LLM Proxy</span>
      </a>
      <notification-region
        slot="aux"
        x-cloak
        x-show="notice.message"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      >
        <p class="notice" x-bind:data-kind="notice.kind" x-text="notice.message"></p>
      </notification-region>
      <mpr-user slot="aux" display-mode="avatar" logout-url="/" logout-label="Sign out"></mpr-user>
    </mpr-header>

    <main class="llm-proxy-main">
      <llm-proxy-key-management x-bind:data-auth-state="authState">
        <section class="llm-panel" x-cloak x-show="authState === states.loading">
          <p class="eyebrow" x-text="copy.loadingEyebrow"></p>
          <h1 x-text="copy.loadingTitle"></h1>
        </section>

        <section class="llm-panel" x-cloak x-show="authState === states.unauthenticated">
          <p class="eyebrow" x-text="copy.signedOutEyebrow"></p>
          <h1 x-text="copy.signedOutTitle"></h1>
        </section>

        <section class="llm-panel" x-cloak x-show="authState === states.error">
          <p class="eyebrow" x-text="copy.profileErrorEyebrow"></p>
          <h1 x-text="copy.profileErrorTitle"></h1>
        </section>

        <template x-if="authState === states.authenticated">
          <workspace-surface>
            <section class="dashboard-hero">
              <header class="section-header">
                <div>
                  <p class="eyebrow" x-text="dashboardEyebrow"></p>
                  <h1 x-text="dashboardTitle"></h1>
                </div>
                <dashboard-actions>
                  <button type="button" x-show="dashboardView === dashboardViews.ADMIN" x-on:click="openUsageDashboard()" x-text="copy.openUsageDashboard"></button>
                  <div class="usage-interval-control" role="group" x-show="dashboardView === dashboardViews.USAGE" x-bind:aria-label="copy.usageInterval">
                    <template x-for="interval in usageIntervals" x-bind:key="interval.id">
                      <button
                        type="button"
                        class="usage-interval-button"
                        x-bind:class="{ 'is-active': selectedUsageInterval === interval.id }"
                        x-bind:aria-pressed="selectedUsageInterval === interval.id ? 'true' : 'false'"
                        x-bind:disabled="usageControlsDisabled"
                        x-on:click="selectUsageInterval(interval.id)"
                        x-text="interval.label"
                      ></button>
                    </template>
                  </div>
                  <button type="button" x-on:click="refreshDashboard()" x-bind:disabled="dashboardRefreshDisabled" x-text="dashboardRefreshCopy"></button>
                </dashboard-actions>
              </header>
            </section>

            <template x-if="dashboardView === dashboardViews.USAGE">
              <usage-dashboard>
                <usage-metrics>
                  <usage-card>
                    <span x-text="copy.usageRequests"></span>
                    <strong x-text="usageTotalRequests"></strong>
                  </usage-card>
                  <usage-card>
                    <span x-text="copy.usageTokens"></span>
                    <strong x-text="usageTotalTokens"></strong>
                  </usage-card>
                  <usage-card>
                    <span x-text="copy.usageSuccessRate"></span>
                    <strong x-text="usageSuccessRate"></strong>
                  </usage-card>
                  <usage-card>
                    <span x-text="copy.usageProviders"></span>
                    <strong x-text="usageProviderCount"></strong>
                  </usage-card>
                </usage-metrics>

                <section class="dashboard-grid">
                  <usage-chart-panel class="llm-panel">
                    <header class="section-header compact">
                      <div>
                        <p class="eyebrow" x-text="copy.usageRequestTrend"></p>
                        <h2 x-text="copy.usageRequests"></h2>
                      </div>
                    </header>
                    <svg class="usage-chart-svg" x-show="hasUsage" x-bind:viewBox="chartViewBox" x-bind:aria-label="copy.usageRequestTrend" role="img">
                      <polyline x-bind:points="usageRequestPolyline"></polyline>
                    </svg>
                    <p class="usage-empty" x-show="!hasUsage" x-text="copy.usageEmpty"></p>
                  </usage-chart-panel>

                  <usage-chart-panel class="llm-panel">
                    <header class="section-header compact">
                      <div>
                        <p class="eyebrow" x-text="copy.usageTokenTrend"></p>
                        <h2 x-text="copy.usageTokens"></h2>
                      </div>
                    </header>
                    <svg class="usage-chart-svg" x-show="hasUsage" x-bind:viewBox="chartViewBox" x-bind:aria-label="copy.usageTokenTrend" role="img">
                      <polyline x-bind:points="usageTokenPolyline"></polyline>
                    </svg>
                    <p class="usage-empty" x-show="!hasUsage" x-text="copy.usageEmpty"></p>
                  </usage-chart-panel>
                </section>

                <section class="dashboard-grid">
                  <usage-breakdown class="llm-panel">
                    <header class="section-header compact">
                      <div>
                        <p class="eyebrow" x-text="copy.usageByProvider"></p>
                        <h2 x-text="copy.usageProviders"></h2>
                      </div>
                    </header>
                    <usage-row-list x-show="hasUsage">
                      <template x-for="row in providerUsageRows" x-bind:key="row.label">
                        <usage-row>
                          <span x-text="row.label"></span>
                          <strong x-text="row.requests"></strong>
                          <usage-bar><i x-bind:style="`width: ${row.width}`"></i></usage-bar>
                        </usage-row>
                      </template>
                    </usage-row-list>
                    <p class="usage-empty" x-show="!hasUsage" x-text="copy.usageEmpty"></p>
                  </usage-breakdown>

                  <usage-breakdown class="llm-panel">
                    <header class="section-header compact">
                      <div>
                        <p class="eyebrow" x-text="copy.usageByModel"></p>
                        <h2 x-text="copy.usageByModel"></h2>
                      </div>
                    </header>
                    <usage-row-list x-show="hasUsage">
                      <template x-for="row in modelUsageRows" x-bind:key="row.label">
                        <usage-row>
                          <span x-text="row.label"></span>
                          <strong x-text="row.requests"></strong>
                          <usage-bar><i x-bind:style="`width: ${row.width}`"></i></usage-bar>
                        </usage-row>
                      </template>
                    </usage-row-list>
                    <p class="usage-empty" x-show="!hasUsage" x-text="copy.usageEmpty"></p>
                  </usage-breakdown>
                </section>
              </usage-dashboard>
            </template>

            <template x-if="dashboardView === dashboardViews.ADMIN">
              <admin-dashboard class="llm-panel">
                <admin-user-list x-show="hasAdminUsers">
                  <template x-for="adminUser in adminUsers" x-bind:key="adminUser.user.id">
                    <admin-user-card>
                      <header>
                        <div>
                          <h2 x-text="adminUserLabel(adminUser)"></h2>
                          <p x-text="adminUser.user.display_name || adminUser.user.id"></p>
                        </div>
                        <span x-text="adminUser.tenant.has_secret ? copy.adminSecretReady : copy.adminSecretMissing"></span>
                      </header>
                      <dl class="admin-user-facts">
                        <div>
                          <dt x-text="copy.adminTenant"></dt>
                          <dd x-text="adminUser.tenant.id"></dd>
                        </div>
                        <div>
                          <dt x-text="copy.usageRequests"></dt>
                          <dd x-text="adminUserRequests(adminUser)"></dd>
                        </div>
                        <div>
                          <dt x-text="copy.usageTokens"></dt>
                          <dd x-text="adminUserTokens(adminUser)"></dd>
                        </div>
                        <div>
                          <dt x-text="copy.usageSuccessRate"></dt>
                          <dd x-text="adminUserSuccessRate(adminUser)"></dd>
                        </div>
                      </dl>
                    </admin-user-card>
                  </template>
                </admin-user-list>
                <p class="usage-empty" x-show="!hasAdminUsers" x-text="copy.adminEmpty"></p>
              </admin-dashboard>
            </template>

            <settings-overlay
              x-cloak
              x-show="settingsOpen"
              x-on:click.self="closeSettings()"
              x-on:keydown.escape.window="providerRemovalConfirmationOpen ? cancelProviderKeyRemoval() : closeSettings()"
              role="presentation"
            >
              <settings-modal
                x-ref="settingsModal"
                role="dialog"
                aria-modal="true"
                aria-labelledby="settings-title"
                x-bind:aria-describedby="settingsRequired ? 'settings-requirement' : null"
                x-bind:inert="providerRemovalConfirmationOpen"
                x-on:keydown.tab="trapSettingsFocus($event)"
              >
                <header class="settings-header">
                  <p id="settings-title" class="eyebrow" x-text="copy.settingsEyebrow"></p>
                  <button type="button" class="icon-only settings-close" x-ref="settingsClose" x-on:click="closeSettings()" x-bind:disabled="settingsClosePending" x-bind:title="copy.closeSettings" x-bind:aria-label="copy.closeSettings">
                    <svg class="utility-icon close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true" focusable="false">
                      <path d="M6 6l12 12"></path>
                      <path d="M18 6L6 18"></path>
                    </svg>
                  </button>
                </header>

                <p
                  id="settings-requirement"
                  class="settings-requirement"
                  x-ref="settingsRequirement"
                  x-cloak
                  x-show="settingsRequired"
                  x-text="settingsRequirementCopy"
                  role="alert"
                  tabindex="-1"
                ></p>

                <settings-body>
                  <client-access-row role="group" x-bind:aria-label="copy.clientKey">
                    <client-access-key>
                      <span class="eyebrow" x-text="copy.clientKey"></span>
                      <client-key-row>
                        <input id="generated-client-key" type="text" readonly x-cloak x-show="hasGeneratedSecret" x-bind:value="generatedSecretValue" x-bind:aria-label="copy.clientKey">
                        <p class="client-key-state" x-cloak x-show="hasSecret && !hasGeneratedSecret" x-text="copy.clientKeyRetained"></p>
                        <p class="client-key-state" x-cloak x-show="!hasSecret" x-text="copy.clientKeyMissing"></p>
                        <button type="button" class="icon-only client-key-visibility-toggle" x-cloak x-show="hasGeneratedSecret" x-on:click="toggleGeneratedSecretVisibility()" x-bind:disabled="settingsControlsDisabled" x-bind:title="generatedSecretVisibilityActionCopy" x-bind:aria-label="generatedSecretVisibilityActionCopy" x-bind:aria-pressed="generatedSecretVisible">
                          <span class="material-symbols-outlined" x-show="!generatedSecretVisible" aria-hidden="true">visibility</span>
                          <span class="material-symbols-outlined" x-show="generatedSecretVisible" aria-hidden="true">visibility_off</span>
                        </button>
                        <button type="button" class="icon-only client-key-copy" x-cloak x-show="hasGeneratedSecret" x-on:click="copyGeneratedSecret()" x-bind:disabled="settingsControlsDisabled" x-bind:title="copy.copyClientKey" x-bind:aria-label="copy.copyClientKey">
                        <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true" focusable="false">
                          <rect x="6" y="5" width="10" height="12" rx="1.5"></rect>
                          <rect x="8" y="7" width="10" height="12" rx="1.5"></rect>
                        </svg>
                        </button>
                        <button type="button" class="icon-only danger client-key-revoke" x-cloak x-show="hasSecret" x-on:click="revokeSecret()" x-bind:disabled="settingsControlsDisabled" x-bind:title="copy.revokeKey" x-bind:aria-label="copy.revokeKey">
                          <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                        </button>
                      </client-key-row>
                    </client-access-key>
                    <button type="button" class="icon-button client-key-create" x-cloak x-show="!hasSecret" x-on:click="generateSecret()" x-bind:disabled="settingsControlsDisabled" x-bind:title="copy.createKey">
                      <span aria-hidden="true">+</span>
                      <span x-text="copy.createKey"></span>
                    </button>
                    <button type="button" class="icon-button client-key-replace" x-cloak x-show="hasSecret" x-on:click="generateSecret()" x-bind:disabled="settingsControlsDisabled" x-bind:title="copy.replaceKey" x-bind:aria-label="copy.replaceKey">
                      <span class="material-symbols-outlined" aria-hidden="true">key</span>
                      <span class="client-key-replace-label" x-text="copy.replaceKey"></span>
                    </button>
                  </client-access-row>

                  <settings-section>
                    <header class="section-header compact">
                      <div>
                        <p class="eyebrow" x-text="copy.defaultsEyebrow"></p>
                        <h2 x-text="copy.defaultsTitle"></h2>
                      </div>
                    </header>
                    <form class="settings-grid-form" x-bind:aria-busy="routingDefaultsAutosavePending">
                      <div class="text-routing-controls">
                        <label>
                          <span x-text="copy.textProvider"></span>
                          <select x-model="defaults.provider" x-on:change="handleTextProviderDefaultChange($event)" x-bind:disabled="settingsControlsDisabled">
                            <template x-for="provider in providers" x-bind:key="provider.id">
                              <option x-bind:value="provider.id" x-text="provider.label"></option>
                            </template>
                          </select>
                        </label>
                        <label>
                          <span x-text="copy.textModel"></span>
                          <select x-model="defaults.model" x-on:change="handleTextModelDefaultChange($event)" x-bind:disabled="settingsControlsDisabled">
                            <template x-for="model in selectedTextModels" x-bind:key="model">
                              <option x-bind:value="model" x-text="model"></option>
                            </template>
                          </select>
                        </label>
                        <label x-show="hasReasoningEffortOptions">
                          <span x-text="copy.reasoningEffort"></span>
                          <select x-model="defaults.reasoning_effort" x-on:change="handleReasoningEffortDefaultChange($event)" x-bind:disabled="settingsControlsDisabled">
                            <option value="" x-text="copy.reasoningEffortUnset"></option>
                            <template x-for="effort in reasoningEffortOptions" x-bind:key="effort">
                              <option x-bind:value="effort" x-text="effort"></option>
                            </template>
                          </select>
                        </label>
                        <p class="reasoning-effort-unsupported" role="status" x-show="!hasReasoningEffortOptions">
                          <span x-text="copy.reasoningEffort"></span>
                          <strong x-text="copy.reasoningEffortUnsupported"></strong>
                        </p>
                      </div>
                      <label>
                        <span x-text="copy.dictationProvider"></span>
                        <select x-model="defaults.dictation_provider" x-on:change="handleDictationProviderDefaultChange($event)" x-bind:disabled="settingsControlsDisabled">
                          <template x-for="provider in dictationProviders" x-bind:key="provider.id">
                            <option x-bind:value="provider.id" x-text="provider.label"></option>
                          </template>
                        </select>
                      </label>
                      <label>
                        <span x-text="copy.dictationModel"></span>
                        <select x-model="defaults.dictation_model" x-on:change="handleDictationModelDefaultChange($event)" x-bind:disabled="settingsControlsDisabled">
                          <template x-for="model in selectedDictationModels" x-bind:key="model">
                            <option x-bind:value="model" x-text="model"></option>
                          </template>
                        </select>
                      </label>
                      <label class="settings-form-wide">
                        <span x-text="copy.systemPrompt"></span>
                        <textarea rows="4" x-bind:value="defaults.system_prompt" x-on:input="handleRoutingSystemPromptInput($event)" x-on:change="autosaveRoutingDefaults()" x-bind:disabled="settingsControlsDisabled"></textarea>
                      </label>
                    </form>
                  </settings-section>

                  <details
                    class="settings-section usage-examples-section"
                    x-bind:open="usageExamplesOpen"
                    x-on:toggle="usageExamplesOpen = $event.currentTarget.open"
                  >
                    <summary class="section-header compact usage-examples-summary">
                      <div>
                        <p class="eyebrow" x-text="copy.examplesEyebrow"></p>
                        <h2 x-text="copy.examplesTitle"></h2>
                      </div>
                    </summary>
                    <example-list>
                      <template x-for="example in requestExamples" x-bind:key="example.id">
                        <request-example x-bind:data-example-id="example.id">
                          <header class="example-header">
                            <h3 x-text="example.title"></h3>
                            <button
                              type="button"
                              x-on:click="copyRequestExample(example.command)"
                              x-bind:title="copy.copyExample"
                              x-bind:aria-label="copy.copyExample"
                              x-text="copy.copyExample"
                            ></button>
                          </header>
                          <pre class="usage-snippet" x-text="example.command"></pre>
                        </request-example>
                      </template>
                    </example-list>
                  </details>

                  <settings-section aria-labelledby="provider-settings-title">
                    <header class="section-header compact provider-section-header">
                      <h2 id="provider-settings-title" class="eyebrow" x-text="copy.providersEyebrow"></h2>
                    </header>
                    <provider-editor>
                      <template x-if="selectedProvider">
                        <provider-settings-fields>
                          <label class="provider-selector">
                            <span class="visually-hidden" x-text="copy.providerSelector"></span>
                            <select x-ref="providerSelector" x-on:change="selectProvider($event.target.value)" x-bind:disabled="settingsControlsDisabled || providerKeyRevealPending">
                              <template x-for="provider in providers" x-bind:key="provider.id">
                                <option x-bind:value="provider.id" x-bind:selected="provider.id === selectedProviderID" x-text="provider.label"></option>
                              </template>
                            </select>
                          </label>
                          <provider-key-field>
                            <label for="provider-api-key-input">
                              <span x-text="selectedProvider.label + copy.providerKeySuffix"></span>
                            </label>
                            <provider-key-input>
                              <input id="provider-api-key-input" x-ref="providerKeyInput" type="text" autocomplete="off" x-bind:value="selectedProviderKeyInputValue" x-on:input="handleSelectedProviderKeyInput($event)" x-on:change="autosaveSelectedProvider()" x-bind:readonly="selectedProviderKeyInputReadOnly" x-bind:disabled="settingsControlsDisabled || providerKeyRevealPending">
                              <button type="button" class="icon-only provider-key-visibility-toggle" x-show="selectedProvider.has_key || selectedProviderKeyHasInput" x-on:mousedown.prevent x-on:click="handleSelectedProviderKeyAction()" x-bind:disabled="settingsControlsDisabled || providerAutosavePending || providerKeyRevealPending" x-bind:title="selectedProviderKeyActionCopy" x-bind:aria-label="selectedProviderKeyActionCopy" x-bind:aria-pressed="providerKeyVisible">
                                <span class="material-symbols-outlined" x-show="!providerKeyVisible" aria-hidden="true">visibility</span>
                                <span class="material-symbols-outlined" x-show="providerKeyVisible" aria-hidden="true">visibility_off</span>
                              </button>
                              <button type="button" class="icon-only danger provider-key-remove" x-ref="providerKeyRemove" x-show="selectedProvider.has_key || selectedProviderKeyHasInput" x-on:mousedown.prevent x-on:click="requestSelectedProviderKeyRemoval()" x-bind:disabled="settingsControlsDisabled || providerAutosavePending || providerKeyRevealPending" x-bind:title="copy.removeProviderKey" x-bind:aria-label="copy.removeProviderKey">
                                <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                              </button>
                            </provider-key-input>
                          </provider-key-field>
                          <label>
                            <span x-text="copy.providerTextModel"></span>
                            <select x-bind:value="providerEditorSession.textModel" x-on:change="handleSelectedProviderTextModelChange($event)" x-bind:disabled="settingsControlsDisabled || providerKeyRevealPending">
                              <template x-for="model in selectedProvider.text_models" x-bind:key="model.id">
                                <option x-bind:value="model.id" x-bind:selected="model.id === providerEditorSession.textModel" x-text="model.id"></option>
                              </template>
                            </select>
                          </label>
                          <label class="provider-system-prompt">
                            <span x-text="copy.providerSystemPrompt"></span>
                            <textarea rows="3" x-bind:value="providerEditorSession.systemPrompt" x-on:input="handleSelectedProviderSystemPromptInput($event)" x-on:change="autosaveSelectedProvider()" x-bind:disabled="settingsControlsDisabled || providerKeyRevealPending"></textarea>
                          </label>
                        </provider-settings-fields>
                      </template>
                    </provider-editor>
                  </settings-section>
                </settings-body>
              </settings-modal>
              <provider-removal-overlay
                x-cloak
                x-show="providerRemovalConfirmationOpen"
                x-on:click.self="cancelProviderKeyRemoval()"
                role="presentation"
              >
                <provider-removal-dialog
                  role="alertdialog"
                  aria-modal="true"
                  aria-labelledby="provider-removal-title"
                  aria-describedby="provider-removal-description"
                  x-on:keydown.tab="trapProviderKeyRemovalFocus($event)"
                >
                  <h3 id="provider-removal-title" x-text="copy.removeProviderKeyConfirmationTitle"></h3>
                  <p id="provider-removal-description" x-text="copy.removeProviderKeyConfirmationMessage"></p>
                  <footer class="provider-removal-actions">
                    <button type="button" x-ref="providerRemovalCancel" x-on:click="cancelProviderKeyRemoval()" x-text="copy.cancelProviderKeyRemoval"></button>
                    <button type="button" class="danger provider-removal-confirm" x-ref="providerRemovalConfirm" x-on:click="confirmProviderKeyRemoval()" x-text="copy.confirmProviderKeyRemoval"></button>
                  </footer>
                </provider-removal-dialog>
              </provider-removal-overlay>
            </settings-overlay>

          </workspace-surface>
        </template>
      </llm-proxy-key-management>
      <section class="public-resource-link" aria-labelledby="public-resource-title">
        <div>
          <p class="eyebrow">Resources</p>
          <h2 id="public-resource-title">LLM Proxy implementation guides</h2>
          <p>Read repo-grounded pages on provider routing, tenant secrets, dictation, usage, runtime config, and the management UI.</p>
        </div>
        <a href="/resources/">Browse resources</a>
      </section>
    </main>

    <mpr-footer theme-switcher="square"></mpr-footer>
  </body>
</html>
