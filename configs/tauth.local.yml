server:
  listen_addr: "${TAUTH_LISTEN_ADDR}"
  database_url: "${TAUTH_DATABASE_URL}"
  enable_cors: "${TAUTH_ENABLE_CORS}"
  cors_allowed_origins:
    - "${LLM_PROXY_MANAGEMENT_PUBLIC_ORIGIN}"
    - "${TAUTH_CORS_EXCEPTION_1}"
  cors_allowed_origin_exceptions:
    - "${TAUTH_CORS_EXCEPTION_1}"
  enable_tenant_header_override: false

tenants:
  - id: "${LLM_PROXY_MANAGEMENT_TAUTH_TENANT_ID}"
    display_name: "LLM Proxy local"
    tenant_origins:
      - "${LLM_PROXY_MANAGEMENT_PUBLIC_ORIGIN}"
    google_web_client_id: "${LLM_PROXY_MANAGEMENT_GOOGLE_CLIENT_ID}"
    jwt_signing_key: "${LLM_PROXY_MANAGEMENT_JWT_SIGNING_KEY}"
    cookie_domain: ""
    session_cookie_name: "${LLM_PROXY_MANAGEMENT_SESSION_COOKIE_NAME}"
    refresh_cookie_name: "${LLM_PROXY_LOCAL_TAUTH_REFRESH_COOKIE_NAME}"
    session_ttl: "30m"
    refresh_ttl: "720h"
    nonce_ttl: "10m"
    allow_insecure_http: "${TAUTH_ALLOW_INSECURE_HTTP}"
